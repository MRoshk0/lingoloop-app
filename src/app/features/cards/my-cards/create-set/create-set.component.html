<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/navbar/cards/my-cards"></ion-back-button>
    </ion-buttons>
    <ion-title>New Card Set</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item class="name-input">
    <ion-input
      [(ngModel)]="name"
      placeholder="Set name (e.g. Food, Travel…)"
      [clearInput]="true"
    ></ion-input>
  </ion-item>

  <ion-button expand="block" class="submit-btn" [disabled]="!name().trim()" (click)="submit()">
    Create Set
  </ion-button>
</ion-content>
