name: Deploy Frontend to NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux, nas]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration production

      - name: Deploy to NAS
        run: |
          rm -rf /volume1/lingoloop/www
          cp -r www /volume1/lingoloop/www

      - name: Restart frontend container
        run: |
          cd /volume1/lingoloop
          sudo docker-compose restart frontend
